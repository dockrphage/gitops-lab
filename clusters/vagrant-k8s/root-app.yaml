apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vagrant-k8s-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dockrphage/gitops-lab.git
    targetRevision: main
    path: clusters/vagrant-k8s/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

