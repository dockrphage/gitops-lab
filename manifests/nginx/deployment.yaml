apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-nginx
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.24.0 # Pin a specific version
        ports:
        - containerPort: 80
